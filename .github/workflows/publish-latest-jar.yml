name: Publish release JAR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release JAR
        run: ./gradlew clean build

      - name: Locate release JAR
        id: jar
        shell: bash
        run: |
          shopt -s nullglob
          jars=(build/libs/*.jar)

          if [ ${#jars[@]} -eq 0 ]; then
            echo "No JAR files were produced in build/libs" >&2
            exit 1
          fi

          release_jars=()
          for jar in "${jars[@]}"; do
            case "$jar" in
              *-sources.jar) ;;
              *) release_jars+=("$jar") ;;
            esac
          done

          if [ ${#release_jars[@]} -eq 0 ]; then
            echo "No release JAR was found in build/libs" >&2
            exit 1
          fi

          if [ ${#release_jars[@]} -ne 1 ]; then
            printf 'Expected exactly one release JAR, found %s:\n' "${#release_jars[@]}" >&2
            printf ' - %s\n' "${release_jars[@]}" >&2
            exit 1
          fi

          latest_jar="${release_jars[0]}"

          echo "path=$latest_jar" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$latest_jar")" >> "$GITHUB_OUTPUT"

      - name: Publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Automated release for `${{ github.ref_name }}` built from `${{ github.sha }}`.

            Asset: `${{ steps.jar.outputs.name }}`
          files: ${{ steps.jar.outputs.path }}
          overwrite_files: true
          generate_release_notes: true
