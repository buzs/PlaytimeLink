name: Publish latest JAR

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-latest-jar
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release JAR
        run: ./gradlew clean build

      - name: Locate remapped JAR
        id: jar
        shell: bash
        run: |
          shopt -s nullglob
          jars=(build/libs/*.jar)

          if [ ${#jars[@]} -eq 0 ]; then
            echo "No JAR files were produced in build/libs" >&2
            exit 1
          fi

          release_jars=()
          for jar in "${jars[@]}"; do
            case "$jar" in
              *-sources.jar) ;;
              *) release_jars+=("$jar") ;;
            esac
          done

          if [ ${#release_jars[@]} -eq 0 ]; then
            echo "No release JAR was found in build/libs" >&2
            exit 1
          fi

          if [ ${#release_jars[@]} -ne 1 ]; then
            printf 'Expected exactly one release JAR, found %s:\n' "${#release_jars[@]}" >&2
            printf ' - %s\n' "${release_jars[@]}" >&2
            exit 1
          fi

          latest_jar="${release_jars[0]}"
          latest_asset="build/libs/playtimelink-fabric-latest.jar"

          cp "$latest_jar" "$latest_asset"

          echo "path=$latest_asset" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$latest_jar")" >> "$GITHUB_OUTPUT"

      - name: Move latest tag to current commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -fa latest "$GITHUB_SHA" -m "Latest automated build"
          git push origin refs/tags/latest --force

      - name: Remove old latest release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if ! gh release view latest >/dev/null 2>&1; then
            exit 0
          fi

          while IFS= read -r asset_name; do
            if [ -n "$asset_name" ]; then
              gh release delete-asset latest "$asset_name" --yes
            fi
          done < <(gh release view latest --json assets --jq '.assets[].name')

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          target_commitish: ${{ github.sha }}
          body: |
            Automated build from `${{ github.ref_name }}` at `${{ github.sha }}`.

            Asset: `${{ steps.jar.outputs.name }}`
          files: ${{ steps.jar.outputs.path }}
          overwrite_files: true
